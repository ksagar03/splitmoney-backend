spring:
  application:
    name: SplitMoney
  datasource:
    url: jdbc:postgresql://localhost:5432/splitmoney
    username: admin
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  graphql:
    graphiql:
      enabled: true
    schema:
      locations: classpath:graphql

